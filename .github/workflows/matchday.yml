name: WC26 Matchday Update

# Daily zero-touch pipeline: refresh the public dataset, settle locked
# predictions, retrain + gate the model, lock new predictions, simulate,
# enrich (resolutions/players/sentiment), rebuild the accountability report,
# verify, then commit the refreshed data/ back to main. Vercel is git-connected,
# so the push auto-deploys production. Nothing here runs until this workflow is
# on the default branch; activation is the merge of this PR.
#
# Secrets: none required. The dataset source is a public GitHub CSV and the
# commit/push uses the built-in GITHUB_TOKEN. Enrichment steps that depend on
# external sources are best-effort (continue-on-error) so a flaky/unavailable
# source degrades gracefully instead of failing the run.

on:
  # Daily cron intentionally disabled. The public results mirror has no
  # in-tournament WC26 finals yet, so an automated `ml:fetch` would overwrite the
  # manually-seeded scores and un-settle the ledger. Run this manually only, when
  # a trustworthy dataset is available. Settle real finals via the safe path:
  #   edit data/raw/results.csv -> fetch-match-results -> pipeline:settle ->
  #   report:accountability  (never a blind re-fetch).
  workflow_dispatch: {} # manual "Run workflow" button only

# Never let two matchday runs overlap (they both mutate data/).
concurrency:
  group: matchday
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  matchday:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      # ── Core pipeline (public dataset, no secrets) ──
      # matchday.mts = fetch-dataset -> build-schedule -> settle-predictions ->
      # train-model (gated; aborts on degradation) -> lock-predictions -> run-simulator
      - name: Run matchday pipeline
        run: npm run matchday

      # ── Enrichment (external sources; best-effort) ──
      - name: Market resolutions
        run: npm run pipeline:resolutions && npm run pipeline:polymarket
        continue-on-error: true

      - name: Player stats + clustering
        run: npm run players:fetch && npm run players:build
        continue-on-error: true

      - name: Sentiment
        run: npm run sentiment:fetch && npm run sentiment:score
        continue-on-error: true

      # ── Accountability report (reads resolutions; runs after enrichment) ──
      - name: Accountability report
        run: npm run report:accountability

      # ── Quality gates: never ship broken data or a broken build ──
      - name: Verify (tests · design inspector · build)
        run: |
          npm run test
          npm run design:inspect
          npm run build

      # ── Open a reviewable PR with the refreshed data (human-in-the-loop) ──
      # Accountability ledger: model retraining + data are never auto-shipped.
      # A human reviews the data diff and merges; the merge (push to main) is
      # what triggers Vercel's production deploy. The action no-ops when data
      # is unchanged, and updates the same PR on subsequent runs.
      - name: Open data-refresh PR
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: data/**
          branch: automation/matchday-update
          delete-branch: true
          commit-message: "chore(data): automated matchday update"
          title: "chore(data): automated matchday update"
          body: |
            Automated daily matchday refresh (settle → gated retrain → lock → simulate → enrich → accountability).

            **Review the `data/` diff before merging** — merging pushes to `main`, which deploys to production via Vercel. Check the accountability report (Brier/ECE) and that the model-degradation gate passed in the workflow logs.
